<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Controller — Neon Bumper Cars</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; touch-action:none; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: background .4s;
  }
  #join-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100%; height:100%; position:absolute; top:0; left:0; z-index:100;
    background:#111;
  }
  #join-btn {
    font-size:28px; font-weight:700; padding:24px 48px;
    border:3px solid #0ff; border-radius:16px;
    background:transparent; color:#0ff; cursor:pointer;
    text-transform:uppercase; letter-spacing:3px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform:scale(1); opacity:1; }
    50% { transform:scale(1.05); opacity:.8; }
  }
  #game-ui {
    display:none; flex-direction:column; align-items:center; justify-content:center;
    width:100%; height:100%; gap:16px; position:relative;
  }
  #status-text {
    font-size:32px; font-weight:700; color:#fff; text-align:center;
    text-shadow: 0 0 20px currentColor;
  }
  #stats {
    font-size:24px; color:#fff; text-align:center;
  }
  #score-display { font-size:48px; font-weight:700; }
  #lives-display { font-size:36px; color:#ff3366; margin-top:4px; }
  #direction-indicator {
    width:80px; height:80px; border:2px solid rgba(255,255,255,0.3);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:36px; color:rgba(255,255,255,0.5); margin-top:12px;
  }
  .flash { animation: flashAnim .15s; }
  @keyframes flashAnim {
    0% { filter:brightness(3); }
    100% { filter:brightness(1); }
  }
</style>
</head>
<body>

<div id="join-screen">
  <button id="join-btn">⚡ TAP TO JOIN ⚡</button>
</div>

<div id="game-ui">
  <div id="player-emoji" style="font-size:72px; line-height:1.1; text-align:center;"></div>
  <div id="player-name" style="font-size:22px; font-weight:700; color:#fff; margin-bottom:8px; text-align:center;"></div>
  <div id="status-text">CONNECTING…</div>
  <div id="stats">
    <div id="score-display">0</div>
    <div id="lives-display">♥♥♥</div>
  </div>
  <div id="direction-indicator">↑</div>
  <div id="shots-display" style="font-size:20px; color:#ff9900; margin-top:8px; letter-spacing:2px;"></div>
  <button id="rejoin-btn" style="display:none; font-size:24px; font-weight:700; padding:20px 40px;
    border:3px solid #0ff; border-radius:16px; background:transparent; color:#0ff;
    cursor:pointer; text-transform:uppercase; letter-spacing:2px; margin-top:20px;
    animation: pulse 1.5s ease-in-out infinite;">🔄 TAP TO REJOIN</button>
  <button id="exit-btn" style="position:absolute; top:12px; right:12px; font-size:14px;
    padding:8px 16px; border:2px solid #666; border-radius:10px; background:transparent;
    color:#888; cursor:pointer;">✕ EXIT</button>
</div>

<div style="position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:11px; color:rgba(255,255,255,0.4); z-index:999;">
  ⚡ Neon Bumper Cars &nbsp;|&nbsp; <a href="https://github.com/carlok/neon-bumper-cars" style="color:rgba(255,255,255,0.4); text-decoration:none;">🐙</a> &nbsp;|&nbsp; © 2026 carlok &nbsp;|&nbsp; v1.1.12
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
// ── Audio Synthesizer ─────────────────────────────────────────────────
class SFX {
  constructor() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  resume() { if (this.ctx.state === 'suspended') this.ctx.resume(); }

  _play(freq, type, duration, vol = 0.3) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + duration);
  }

  swipe() {
    this._play(880, 'square', 0.08, 0.15);
  }

  shoot() {
    this._play(1200, 'square', 0.06, 0.2);
    this._play(900, 'sawtooth', 0.1, 0.15);
  }

  coin() {
    const t = this.ctx.currentTime;
    const notes = [660, 880, 1100, 1320];
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, t + i * 0.06);
      gain.gain.setValueAtTime(0.2, t + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.12);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(t + i * 0.06);
      osc.stop(t + i * 0.06 + 0.12);
    });
  }

  collision() {
    this._play(80, 'sawtooth', 0.3, 0.4);
    this._play(60, 'square', 0.25, 0.3);
  }

  death() {
    const t = this.ctx.currentTime;
    const notes = [440, 370, 311, 261, 220];
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f, t + i * 0.15);
      gain.gain.setValueAtTime(0.25, t + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.2);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 0.2);
    });
  }

  blocked() {
    this._play(110, 'sawtooth', 0.15, 0.25);
  }

  rejoin() {
    // Ascending power-up: quick bright arpeggio
    const t = this.ctx.currentTime;
    const notes = [330, 440, 550, 660, 880];
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, t + i * 0.05);
      gain.gain.setValueAtTime(0.2, t + i * 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.1);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(t + i * 0.05);
      osc.stop(t + i * 0.05 + 0.1);
    });
  }

  gameStart() {
    // Fanfare: two rising chords
    const t = this.ctx.currentTime;
    [523, 659, 784].forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, t + i * 0.1);
      gain.gain.setValueAtTime(0.15, t + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.2);
      osc.connect(gain).connect(this.ctx.destination);
      osc.start(t + i * 0.1);
      osc.stop(t + i * 0.1 + 0.2);
    });
  }
}

// ── Vibration patterns (distinct per action) ────────────────────────
const VIBE = {
  shoot:     [20, 10, 40],               // quick snap
  swipe:     15,                         // tiny tick
  coin:      [30, 20, 30],               // double-tap reward
  collision: [80, 30, 150],              // bump then grind
  blocked:   [40, 20, 40],              // short double-thud
  eliminated:[100, 50, 100, 50, 300],    // dramatic pattern burst
  rejoin:    [30, 20, 30, 20, 60],       // ascending quick taps
  gameStart: [50, 30, 50, 30, 100],      // ready-set-go
  gameOver:  [200, 100, 400],            // long fade
};
function vibe(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── State ─────────────────────────────────────────────────────────────
let sfx, socket;
let myColor = '#0ff';
let myName = '';
let myEmoji = '';
let myGameState = 'WAITING';
let score = 0;
let lives = 3;
let shotsLeft = 10;
let joined = false;

const joinScreen = document.getElementById('join-screen');
const gameUI = document.getElementById('game-ui');
const statusText = document.getElementById('status-text');
const scoreDisplay = document.getElementById('score-display');
const livesDisplay = document.getElementById('lives-display');
const dirIndicator = document.getElementById('direction-indicator');
const playerNameEl = document.getElementById('player-name');
const playerEmojiEl = document.getElementById('player-emoji');
const rejoinBtn = document.getElementById('rejoin-btn');
const shotsDisplay = document.getElementById('shots-display');
const arrows = { up:'↑', down:'↓', left:'←', right:'→' };

// ── Join ──────────────────────────────────────────────────────────────
document.getElementById('join-btn').addEventListener('click', (e) => {
  console.log('[JOIN] TAP TO JOIN clicked', { joined, timestamp: Date.now() });

  if (joined) {
    console.warn('[JOIN] Already joined, ignoring duplicate tap');
    return;
  }

  try {
    sfx = new SFX();
    sfx.resume();
    console.log('[JOIN] AudioContext created, state:', sfx.ctx.state);
  } catch (err) {
    console.error('[JOIN] AudioContext error:', err);
  }

  try {
    socket = io();
    console.log('[JOIN] Socket.IO instance created');

    socket.on('connect', () => {
      console.log('[JOIN] Socket connected, id:', socket.id);
      console.log('[JOIN] Emitting join-player');
      socket.emit('join-player');
    });

    socket.on('connect_error', (err) => {
      console.error('[JOIN] Socket connect_error:', err.message);
    });

    socket.on('disconnect', (reason) => {
      console.warn('[JOIN] Socket disconnected:', reason);
    });

    socket.on('player-info', (data) => {
      console.log('[JOIN] player-info received:', data);
      myColor = data.color;
      myName = data.name || myName;
      myEmoji = data.emoji || myEmoji;
      myGameState = data.gameState;
      if (data.score !== undefined) score = data.score;
      if (data.shotsLeft !== undefined) shotsLeft = data.shotsLeft;
      lives = 3;
      updateUI();
    });

    socket.on('gameStateChange', (s) => {
      console.log('[STATE] gameStateChange:', s);
      myGameState = s;
      if (s === 'PLAYING') { sfx.gameStart(); vibe(VIBE.gameStart); }
      if (s === 'STOPPED') { vibe(VIBE.gameOver); }
      updateUI();
    });

    socket.on('score', (s) => {
      score = s;
      scoreDisplay.textContent = score;
      sfx.coin();
      vibe(VIBE.coin);
      flash();
    });

    socket.on('collision', (data) => {
      lives = data.lives;
      livesDisplay.textContent = '♥'.repeat(Math.max(0, lives));
      sfx.collision();
      vibe(VIBE.collision);
      flash();
    });

    socket.on('blocked', () => {
      sfx.blocked();
      vibe(VIBE.blocked);
    });

    socket.on('shot-fired-ack', (data) => {
      if (data && data.shotsLeft !== undefined) {
        shotsLeft = data.shotsLeft;
        updateShotsDisplay();
      }
    });

    socket.on('eliminated', () => {
      myGameState = 'ELIMINATED';
      sfx.death();
      vibe(VIBE.eliminated);
      updateUI();
    });

    socket.on('room-full', () => {
      console.log('[JOIN] Room is full');
      myGameState = 'FULL';
      updateUI();
    });
  } catch (err) {
    console.error('[JOIN] Socket setup error:', err);
    return;
  }

  joinScreen.style.display = 'none';
  gameUI.style.display = 'flex';
  joined = true;
  console.log('[JOIN] UI switched to game view');
  updateUI();
});

function updateUI() {
  playerNameEl.textContent = myName;
  playerEmojiEl.textContent = myEmoji;
  rejoinBtn.style.display = 'none';

  if (myGameState === 'WAITING') {
    document.body.style.background = myColor;
    statusText.textContent = 'WAITING FOR HOST…';
    statusText.style.color = '#000';
    scoreDisplay.style.display = 'none';
    livesDisplay.style.display = 'none';
    dirIndicator.style.display = 'none';
  } else if (myGameState === 'PLAYING') {
    document.body.style.background = '#111';
    statusText.textContent = 'SWIPE TO MOVE';
    statusText.style.color = myColor;
    scoreDisplay.style.display = 'block';
    livesDisplay.style.display = 'block';
    dirIndicator.style.display = 'flex';
    scoreDisplay.textContent = score;
    livesDisplay.textContent = '♥'.repeat(Math.max(0, lives));
    updateShotsDisplay();
  } else if (myGameState === 'ELIMINATED') {
    document.body.style.background = '#222';
    statusText.textContent = 'ELIMINATED!';
    statusText.style.color = '#ff3366';
    scoreDisplay.style.display = 'block';
    livesDisplay.style.display = 'none';
    dirIndicator.style.display = 'none';
    rejoinBtn.style.display = 'block';
  } else if (myGameState === 'STOPPED') {
    document.body.style.background = '#111';
    statusText.textContent = 'GAME OVER';
    statusText.style.color = '#888';
  } else if (myGameState === 'FULL') {
    document.body.style.background = '#111';
    statusText.textContent = 'ROOM FULL — WAIT';
    statusText.style.color = '#ff6600';
    scoreDisplay.style.display = 'none';
    livesDisplay.style.display = 'none';
    dirIndicator.style.display = 'none';
  }
}

function updateShotsDisplay() {
  if (!shotsDisplay) return;
  if (shotsLeft <= 0) {
    shotsDisplay.textContent = '🔴 NO SHOTS LEFT';
    shotsDisplay.style.color = '#ff3366';
  } else {
    shotsDisplay.textContent = '💥 ' + shotsLeft + ' shots';
    shotsDisplay.style.color = shotsLeft <= 3 ? '#ff6600' : '#ff9900';
  }
}

// ── Rejoin after elimination ─────────────────────────────────────────
rejoinBtn.addEventListener('click', () => {
  console.log('[REJOIN] Rejoin tapped');
  if (!socket || myGameState !== 'ELIMINATED') return;
  socket.emit('rejoin-player');
  sfx.rejoin();
  vibe(VIBE.rejoin);
  myGameState = 'PLAYING';
  score = 0;
  lives = 3;
  shotsLeft = 10;
  rejoinBtn.style.display = 'none';
  updateUI();
});

// ── Exit game ────────────────────────────────────────────────────────
document.getElementById('exit-btn').addEventListener('click', () => {
  if (!joined) return;
  if (socket) socket.disconnect();
  joined = false;
  myGameState = 'WAITING';
  score = 0;
  lives = 3;
  gameUI.style.display = 'none';
  joinScreen.style.display = 'flex';
});

function flash() {
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 150);
}

// ── Swipe Detection ───────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
let lastDir = 'up';

// Let touch events pass through to buttons (join + rejoin)
function isTouchOnButton(e) {
  const t = e.target;
  return t.tagName === 'BUTTON' || t.closest('button');
}

document.addEventListener('touchstart', (e) => {
  if (!joined || isTouchOnButton(e)) return;
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (!joined || isTouchOnButton(e)) return;
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (!joined || isTouchOnButton(e)) return; // Let clicks through to buttons
  e.preventDefault();
  if (myGameState !== 'PLAYING' || !socket) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const minSwipe = 20;

  // Tap (no significant movement) → shoot
  if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) {
    if (shotsLeft <= 0) {
      vibe([30]);
      return;
    }
    socket.emit('shoot');
    shotsLeft = Math.max(0, shotsLeft - 1);
    sfx.shoot();
    vibe(VIBE.shoot);
    dirIndicator.textContent = '💥';
    updateShotsDisplay();
    setTimeout(() => dirIndicator.textContent = arrows[lastDir] || '↑', 300);
    return;
  }

  let dir;
  if (Math.abs(dx) > Math.abs(dy)) {
    dir = dx > 0 ? 'right' : 'left';
  } else {
    dir = dy > 0 ? 'down' : 'up';
  }
  socket.emit('swipe', dir);
  sfx.swipe();
  vibe(VIBE.swipe);
  lastDir = dir;
  dirIndicator.textContent = arrows[dir];
}, { passive: false });

// Block all default touch behaviors
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
