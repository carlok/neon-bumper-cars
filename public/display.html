<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Bumper Cars — Display</title>
<style>
  * { margin:0; padding:0; }
  body { background:#111; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let gameState = 'WAITING';
let serverPlayers = {};
let serverCoin = null;
let obstacles = [];

socket.on('connect', () => socket.emit('join-display'));
socket.on('init', (data) => {
  obstacles = data.obstacles;
  gameState = data.gameState;
  serverCoin = data.coin;
});
socket.on('gameStateChange', (s) => { gameState = s; });
let serverBullets = [];
socket.on('frame', (data) => {
  serverPlayers = data.players;
  serverCoin = data.coin;
  serverBullets = data.bullets || [];
});
socket.on('coin-spawned', (c) => { serverCoin = c; });

// Events queued for Phaser scene
const eventQueue = [];
socket.on('coin-eaten', (d) => eventQueue.push({ type:'coin-eaten', ...d }));
socket.on('bump', (d) => eventQueue.push({ type:'bump', ...d }));
socket.on('player-eliminated', (id) => eventQueue.push({ type:'eliminated', id }));
socket.on('shot-hit', (d) => eventQueue.push({ type:'shot-hit', ...d }));
socket.on('shot-fired', (d) => eventQueue.push({ type:'shot-fired', ...d }));

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.playerGfx = {};
    this.trailEmitters = {};
    this.bulletGfx = [];  // array of Phaser graphics for bullets

    // ── Layout constants ──────────────────────────────────────────────
    const GAME_W = 1600;  // game area width (matches server ARENA_W)
    const SIDEBAR_W = 320; // right sidebar
    const SIDEBAR_X = GAME_W; // sidebar starts here

    // ── Sidebar background ──────────────────────────────────────────
    this.add.rectangle(SIDEBAR_X + SIDEBAR_W / 2, 540, SIDEBAR_W, 1080, 0x3b2d4a)
      .setDepth(140);
    // Divider line
    this.add.rectangle(SIDEBAR_X, 540, 3, 1080, 0x6644aa).setDepth(141);

    // ── Terrain background (game area only) ─────────────────────────
    const terrainTiles = ['░', '▒', '·', '∙', '╌', '░'];
    const terrainColors = ['#e0d8a8', '#d8d0a0', '#e5ddb0', '#ddd5a5', '#e2daa8', '#d5cd98'];
    const tileW = 80;   // 1600 / 80 = 20 columns (exact)
    const tileH = 72;   // 1080 / 72 = 15 rows (exact)
    for (let tx = 0; tx < GAME_W; tx += tileW) {
      for (let ty = 0; ty < 1080; ty += tileH) {
        const col = tx / tileW;
        const row = ty / tileH;
        const idx = (col + row) % terrainTiles.length;
        const jitter = ((tx * 7 + ty * 13) % 6);
        const tile = terrainTiles[(idx + jitter) % terrainTiles.length];
        const color = terrainColors[(idx + jitter) % terrainColors.length];
        this.add.text(tx + tileW / 2, ty + tileH / 2, tile, {
          fontSize: '44px', fontFamily: 'monospace', color: color
        }).setOrigin(0.5).setDepth(0).setAlpha(0.5);
      }
    }

    // Faint terrain emoji patches (game area only)
    const patches = [
      { e: '🌿', c: 12 }, { e: '🌾', c: 8 }, { e: '🪨', c: 6 }, { e: '🏜️', c: 5 }
    ];
    for (const patch of patches) {
      for (let i = 0; i < patch.c; i++) {
        const px = 60 + Math.floor(((i * 347 + patch.c * 113) % (GAME_W - 120)));
        const py = 60 + Math.floor(((i * 521 + patch.c * 79) % 960));
        this.add.text(px, py, patch.e, { fontSize: '28px' })
          .setOrigin(0.5).setDepth(1).setAlpha(0.12);
      }
    }

    // Obstacle text objects
    this.obsTexts = [];

    // Coin text (emoji updated dynamically from server)
    this.coinText = this.add.text(0, 0, '🍎', { fontSize: '36px' }).setOrigin(0.5).setDepth(5);

    // ── Sidebar: Leaderboard ────────────────────────────────────────
    const lbCenterX = SIDEBAR_X + SIDEBAR_W / 2;
    this.lbTitle = this.add.text(lbCenterX, 24, '🏆 LEADERBOARD', {
      fontSize: '22px', fontFamily: 'monospace', color: '#ffdd44', align: 'center'
    }).setOrigin(0.5, 0).setDepth(151);
    this.lbRows = [];
    this.lbBgs = [];
    const rowH = 34;
    const rowW = SIDEBAR_W - 20;
    for (let i = 0; i < 10; i++) {
      const ry = 60 + i * rowH;
      // Button-style background with rounded look
      const bg = this.add.rectangle(SIDEBAR_X + 10 + rowW / 2, ry + rowH / 2 - 2, rowW, rowH - 4, 0x4a3660)
        .setDepth(150).setAlpha(0);
      // Highlight edge (top lighter)
      const highlight = this.add.rectangle(SIDEBAR_X + 10 + rowW / 2, ry + 2, rowW, 2, 0x7755aa)
        .setDepth(150).setAlpha(0);
      this.lbBgs.push({ bg, highlight });
      const t = this.add.text(SIDEBAR_X + 12, ry + 2, '', {
        fontSize: '16px', fontFamily: 'monospace', color: '#eee'
      }).setDepth(151);
      this.lbRows.push(t);
    }

    // ── Sidebar: QR code (below leaderboard) ────────────────────────
    const origin = window.location.origin;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(origin + '/controller.html')}`;
    this.qrLoaded = false;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      this.textures.addImage('qr', img);
      this.qrSprite = this.add.image(lbCenterX, 930, 'qr')
        .setDisplaySize(175, 175).setDepth(152).setAlpha(0.95);
      this.qrLoaded = true;
    };
    img.src = qrUrl;

    // "SCAN TO PLAY" text — sits above the QR with clear gap
    this.add.text(lbCenterX, 818, '📱 SCAN TO PLAY', {
      fontSize: '18px', fontFamily: 'monospace', color: '#ffdd44', align: 'center'
    }).setOrigin(0.5).setDepth(152);

    // Waiting text (centered in game area)
    this.waitingText = this.add.text(GAME_W / 2, 480, 'WAITING FOR HOST...', {
      fontSize: '72px', fontFamily: 'monospace', color: '#333',
      stroke: '#999', strokeThickness: 4
    }).setOrigin(0.5).setDepth(200).setAlpha(0);

    // Particle texture (small white square)
    const pg = this.make.graphics({ add: false });
    pg.fillStyle(0xffffff);
    pg.fillRect(0, 0, 6, 6);
    pg.generateTexture('particle', 6, 6);
    pg.destroy();

    // Project name + GitHub + copyright + version (under QR in sidebar)
    this.add.text(lbCenterX, 1030, '⚡ Neon Bumper Cars', {
      fontSize: '15px', fontFamily: 'monospace', color: '#ffffff', align: 'center'
    }).setOrigin(0.5).setDepth(152);
    this.add.text(lbCenterX, 1050, '🐙 carlok/neon-bumper-cars', {
      fontSize: '13px', fontFamily: 'monospace', color: '#aaaaaa', align: 'center'
    }).setOrigin(0.5).setDepth(152);
    this.add.text(lbCenterX, 1068, '© 2026 carlok  |  v1.1.7', {
      fontSize: '13px', fontFamily: 'monospace', color: '#888888', align: 'center'
    }).setOrigin(0.5).setDepth(152);

    this.obstaclesCreated = false;
  }

  update() {
    // Create obstacles once
    if (!this.obstaclesCreated && obstacles.length > 0) {
      this.obstaclesCreated = true;
      const treeEmojis = ['🌲', '🌳', '🌴', '🌵', '🪴'];
      const stoneEmojis = ['🪨', '🧱', '🪵', '🗿', '⛰️'];
      const emojiMap = { lake: '🌊' };
      let stoneIdx = 0;
      let treeIdx = 0;
      for (const ob of obstacles) {
        let emoji;
        if (ob.type === 'tree') {
          emoji = treeEmojis[treeIdx % treeEmojis.length];
          treeIdx++;
        } else if (ob.type === 'stone') {
          emoji = stoneEmojis[stoneIdx % stoneEmojis.length];
          stoneIdx++;
        } else {
          emoji = emojiMap[ob.type] || '❓';
        }
        const t = this.add.text(ob.x + ob.w / 2, ob.y + ob.h / 2, emoji, {
          fontSize: `${Math.min(ob.w, ob.h)}px`
        }).setOrigin(0.5).setDepth(3);
        this.obsTexts.push(t);
      }
    }

    // Waiting overlay
    if (gameState === 'WAITING') {
      this.waitingText.setAlpha(0.7 + 0.3 * Math.sin(this.time.now / 400));
    } else {
      this.waitingText.setAlpha(0);
    }

    // Process event queue
    while (eventQueue.length) {
      const ev = eventQueue.shift();
      if (ev.type === 'coin-eaten') this.doCoinBurst(ev.cx, ev.cy);
      if (ev.type === 'bump') this.doBump(ev);
      if (ev.type === 'eliminated') this.doEliminated(ev.id);
      if (ev.type === 'shot-hit') this.doShotHit(ev);
      if (ev.type === 'shot-fired') this.doShotFlash(ev);
    }

    // Update / create player graphics
    for (const id in serverPlayers) {
      const sp = serverPlayers[id];
      if (!sp.alive) {
        if (this.playerGfx[id]) {
          this.playerGfx[id].destroy();
          delete this.playerGfx[id];
        }
        if (this.trailEmitters[id]) {
          this.trailEmitters[id].stop();
          delete this.trailEmitters[id];
        }
        continue;
      }
      if (!this.playerGfx[id]) {
        const faceEmoji = sp.emoji || '😀';
        const g = this.add.text(sp.x, sp.y, faceEmoji, { fontSize: '36px' })
          .setOrigin(0.5).setDepth(10);
        this.playerGfx[id] = g;

        // Particle trail (red menacing trail for bots)
        const trailTint = sp.isBot ? 0xff0000 : Phaser.Display.Color.HexStringToColor(sp.color).color;
        const emitter = this.add.particles(0, 0, 'particle', {
          speed: { min: 10, max: sp.isBot ? 50 : 30 },
          scale: { start: sp.isBot ? 1.2 : 0.8, end: 0 },
          alpha: { start: sp.isBot ? 0.8 : 0.6, end: 0 },
          lifespan: sp.isBot ? 600 : 400,
          frequency: sp.isBot ? 30 : 50,
          blendMode: Phaser.BlendModes.ADD,
          tint: trailTint,
        });
        emitter.setDepth(9);
        this.trailEmitters[id] = emitter;
      }

      const g = this.playerGfx[id];
      g.setPosition(sp.x + 20, sp.y + 20);

      // Blink when invulnerable
      if (sp.invuln) {
        g.setAlpha(Math.sin(this.time.now / 50) > 0 ? 1 : 0.2);
      } else {
        g.setAlpha(1);
      }

      // Trail follow
      if (this.trailEmitters[id]) {
        this.trailEmitters[id].setPosition(sp.x + 20, sp.y + 20);
      }
    }

    // Remove disconnected
    for (const id in this.playerGfx) {
      if (!serverPlayers[id]) {
        this.playerGfx[id].destroy();
        delete this.playerGfx[id];
        if (this.trailEmitters[id]) {
          this.trailEmitters[id].stop();
          delete this.trailEmitters[id];
        }
      }
    }

    // Coin — permanent gentle pulse so it is always easy to spot
    if (serverCoin) {
      if (serverCoin.emoji) this.coinText.setText(serverCoin.emoji);
      this.coinText.setPosition(serverCoin.x + 15, serverCoin.y + 15).setVisible(true);
      this.coinText.setScale(1.0 + 0.28 * Math.sin(this.time.now / 220));
    } else {
      this.coinText.setVisible(false);
    }

    // ── Bullets ──────────────────────────────────────────────────────
    // Remove old bullet graphics
    for (const bg of this.bulletGfx) bg.destroy();
    this.bulletGfx = [];
    // Draw current bullets (bright, visible projectiles)
    for (const b of serverBullets) {
      const color = Phaser.Display.Color.HexStringToColor(b.ownerColor || '#ff0').color;
      // Core bullet
      const core = this.add.circle(b.x + 5, b.y + 5, 7, 0xffffff).setDepth(21).setAlpha(1);
      // Colored ring
      const ring = this.add.circle(b.x + 5, b.y + 5, 10, color).setDepth(20).setAlpha(0.8);
      // Outer glow
      const glow = this.add.circle(b.x + 5, b.y + 5, 16, color).setDepth(19).setAlpha(0.25);
      this.bulletGfx.push(core, ring, glow);
    }

    // Leaderboard with names (exclude bots)
    const sorted = Object.values(serverPlayers)
      .filter(p => p.alive && !p.isBot)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);
    for (let i = 0; i < 10; i++) {
      if (i < sorted.length) {
        const p = sorted[i];
        const hearts = '♥'.repeat(Math.max(0, p.lives));
        const name = (p.name || '???').slice(0, 10);
        const shots = p.shotsLeft !== undefined ? ` 💥${p.shotsLeft}` : '';
        this.lbRows[i].setText(`${i + 1}. ${p.emoji || '■'} ${name} ${p.score}p ${hearts}${shots}`);
        this.lbRows[i].setColor(p.color);
        this.lbBgs[i].bg.setAlpha(i === 0 ? 0.9 : 0.6);
        this.lbBgs[i].highlight.setAlpha(i === 0 ? 0.8 : 0.4);
      } else {
        this.lbRows[i].setText('');
        this.lbBgs[i].bg.setAlpha(0);
        this.lbBgs[i].highlight.setAlpha(0);
      }
    }
  }

  doCoinBurst(cx, cy) {
    const burst = this.add.particles(cx, cy, 'particle', {
      speed: { min: 80, max: 200 },
      scale: { start: 1.2, end: 0 },
      lifespan: 500,
      quantity: 20,
      tint: 0xffff00,
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(50);
    burst.explode(20);
    this.time.delayedCall(600, () => burst.destroy());
  }

  doBump(ev) {
    this.cameras.main.shake(200, 0.01);
    // Explosion at midpoint
    const mx = (ev.ax + ev.bx) / 2;
    const my = (ev.ay + ev.by) / 2;
    const burst = this.add.particles(mx, my, 'particle', {
      speed: { min: 100, max: 300 },
      scale: { start: 1.5, end: 0 },
      lifespan: 400,
      quantity: 30,
      tint: [0xff3366, 0xff6600, 0xffff00],
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(50);
    burst.explode(30);
    this.time.delayedCall(500, () => burst.destroy());
  }

  doEliminated(id) {
    const g = this.playerGfx[id];
    if (g) {
      const burst = this.add.particles(g.x, g.y, 'particle', {
        speed: { min: 50, max: 250 },
        scale: { start: 2, end: 0 },
        lifespan: 800,
        quantity: 40,
        tint: 0xff0000,
        blendMode: Phaser.BlendModes.ADD,
        emitting: false,
      });
      burst.setDepth(50);
      burst.explode(40);
      this.time.delayedCall(900, () => burst.destroy());
    }
  }

  doShotFlash(ev) {
    // Muzzle flash at shot origin
    const flash = this.add.circle(ev.x + 5, ev.y + 5, 12,
      Phaser.Display.Color.HexStringToColor(ev.color || '#fff').color)
      .setDepth(55).setAlpha(0.8);
    this.tweens.add({
      targets: flash, alpha: 0, scale: 2, duration: 150,
      onComplete: () => flash.destroy()
    });
  }

  doShotHit(ev) {
    if (ev.type === 'obstacle') return; // no visual for hitting static objects

    // Glow burst when hitting player or bot
    const tint = ev.type === 'bot' ? 0x00ffff : 0xff3366;
    const burst = this.add.particles(ev.x, ev.y, 'particle', {
      speed: { min: 60, max: 180 },
      scale: { start: 1.5, end: 0 },
      lifespan: 400,
      quantity: 20,
      tint: tint,
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(55);
    burst.explode(20);
    this.time.delayedCall(500, () => burst.destroy());

    // Flash ring
    const ring = this.add.circle(ev.x, ev.y, 8, tint).setDepth(56).setAlpha(0.9);
    this.tweens.add({
      targets: ring, alpha: 0, scale: 5, duration: 300,
      onComplete: () => ring.destroy()
    });
  }
}

const config = {
  type: Phaser.WEBGL,
  width: 1920,
  height: 1080,
  backgroundColor: '#111111',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: GameScene,
};

new Phaser.Game(config);
</script>
</body>
</html>
