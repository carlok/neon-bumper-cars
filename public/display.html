<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Bumper Cars — Display</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height:100%; }
  body {
    background:#111;
    overflow:hidden;
    height:100%;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phaser-root { flex-shrink:0; min-height:0; min-width:0; }
  canvas { display:block; }
</style>
</head>
<body>
<div id="phaser-root"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let gameState = 'WAITING';
let serverPlayers = {};
let serverCoins = [];
let obstacles = [];
let gameScene = null; // reference set in create() for out-of-scene event handlers

socket.on('connect', () => socket.emit('join-display'));
socket.on('init', (data) => {
  obstacles = data.obstacles;
  gameState = data.gameState;
  serverCoins = data.coins || [];
  if (data.displayConfig) {
    displayConfig = sanitizeDisplayConfig(data.displayConfig);
  }
  applyDisplayViewportSize();
  if (gameScene) gameScene.setDisplayConfig(displayConfig);
});
socket.on('gameStateChange', (s) => { gameState = s; });
let serverBullets = [];
socket.on('frame', (data) => {
  serverPlayers = data.players;
  serverCoins = data.coins || [];
  serverBullets = data.bullets || [];
});
socket.on('coin-spawned', (c) => { serverCoins.push(c); });

// Events queued for Phaser scene
const eventQueue = [];
socket.on('coin-eaten', (d) => eventQueue.push({ type:'coin-eaten', ...d }));
socket.on('bump', (d) => eventQueue.push({ type:'bump', ...d }));
socket.on('player-eliminated', (id) => eventQueue.push({ type:'eliminated', id }));
socket.on('shot-hit', (d) => eventQueue.push({ type:'shot-hit', ...d }));
socket.on('shot-fired', (d) => eventQueue.push({ type:'shot-fired', ...d }));
socket.on('obstacles-reset', (newObs) => {
  obstacles = newObs;
  eventQueue.push({ type: 'obstacles-reset', obstacles: newObs });
});
/** World units that one “cell” maps from at the default calibration (matches 40px label). */
const DISPLAY_CELL_REF_WORLD = 40;
/** Logical game width including sidebar (must match Phaser config width). */
const DISPLAY_LOGIC_W = 1920;
/** Logical game height (must match Phaser config height). */
const DISPLAY_LOGIC_H = 1080;
/** Arena width in world units (matches server ARENA_W / displayCalibrate). */
const ARENA_LOGIC_W = 1600;
/** Right sidebar in world units (1920 − arena); must match displayCalibrate DISPLAY_SIDEBAR_WORLD. */
const DISPLAY_SIDEBAR_WORLD = DISPLAY_LOGIC_W - ARENA_LOGIC_W;
/** Default visible arena columns when server config is missing. */
const DISPLAY_DEFAULT_ARENA_COLUMNS = 40;
/** Minimum visible arena columns. */
const DISPLAY_MIN_ARENA_COLUMNS = 8;
/** Maximum visible arena columns. */
const DISPLAY_MAX_ARENA_COLUMNS = 40;

let displayConfig = {
  targetWidth: DISPLAY_LOGIC_W,
  targetHeight: DISPLAY_LOGIC_H,
  arenaColumns: DISPLAY_DEFAULT_ARENA_COLUMNS,
};

function sanitizeArenaColumns(value) {
  const cols = Math.round(Number(value));
  if (!Number.isFinite(cols) || cols <= 0) return DISPLAY_DEFAULT_ARENA_COLUMNS;
  return Math.max(DISPLAY_MIN_ARENA_COLUMNS, Math.min(DISPLAY_MAX_ARENA_COLUMNS, cols));
}

function normalizeDisplayResolution(targetWidth, targetHeight) {
  const width = Number(targetWidth);
  const height = Number(targetHeight);
  return {
    width: Number.isFinite(width) && width >= 1 ? width : DISPLAY_LOGIC_W,
    height: Number.isFinite(height) && height >= 1 ? height : DISPLAY_LOGIC_H,
  };
}

function fitDisplayResolution(targetWidth, targetHeight) {
  const target = normalizeDisplayResolution(targetWidth, targetHeight);
  const scale = Math.min(target.width / DISPLAY_LOGIC_W, target.height / DISPLAY_LOGIC_H);
  return {
    width: DISPLAY_LOGIC_W * scale,
    height: DISPLAY_LOGIC_H * scale,
  };
}

function arenaContentWidthCss(displayWidthCss) {
  return displayWidthCss * (ARENA_LOGIC_W / DISPLAY_LOGIC_W);
}

/** Sidebar-aware zoom — sync with displayCalibrate.displayZoomForArenaColumns. */
function displayZoomForArenaColumns(arenaColumns) {
  const cols = sanitizeArenaColumns(arenaColumns);
  const denom = DISPLAY_CELL_REF_WORLD * cols + DISPLAY_SIDEBAR_WORLD;
  const z = DISPLAY_LOGIC_W / denom;
  return Math.max(1, Math.min(16, z));
}

function computeDisplayProjection(arenaColumns, targetWidth, targetHeight) {
  const cols = sanitizeArenaColumns(arenaColumns);
  const fitted = fitDisplayResolution(targetWidth, targetHeight);
  const zoom = displayZoomForArenaColumns(cols);
  const arenaCssW = arenaContentWidthCss(fitted.width);
  return {
    arenaColumns: cols,
    fittedWidth: fitted.width,
    fittedHeight: fitted.height,
    screenCellPx: cols > 0 ? arenaCssW / cols : 0,
    zoom,
  };
}

function displayViewportCssSize() {
  const fitted = fitDisplayResolution(displayConfig.targetWidth, displayConfig.targetHeight);
  const s = Math.min(
    1,
    window.innerWidth / fitted.width,
    window.innerHeight / fitted.height
  );
  return {
    width: Math.round(fitted.width * s),
    height: Math.round(fitted.height * s),
  };
}

function applyDisplayViewportSize() {
  const { width, height } = displayViewportCssSize();
  const root = document.getElementById('phaser-root');
  root.style.width = width + 'px';
  root.style.height = height + 'px';
  if (window.__neonPhaserGame && window.__neonPhaserGame.scale) {
    window.__neonPhaserGame.scale.refresh();
  }
}

function sanitizeDisplayConfig(nextConfig) {
  const resolution = normalizeDisplayResolution(nextConfig?.targetWidth, nextConfig?.targetHeight);
  return {
    targetWidth: resolution.width,
    targetHeight: resolution.height,
    arenaColumns: sanitizeArenaColumns(nextConfig?.arenaColumns),
  };
}

socket.on('display-config', (nextConfig) => {
  displayConfig = sanitizeDisplayConfig(nextConfig);
  applyDisplayViewportSize();
  if (gameScene) gameScene.setDisplayConfig(displayConfig);
});

/** Camera center X — sync with displayCalibrate.displayCameraCenterX.
 *  z ≤ 1: center the full 1920-wide layout.
 *  z > 1: right-anchor so the viewport ends at x=1920 (sidebar/leaderboard visible). */
function displayCameraCenterXFromZoom(z) {
  if (!Number.isFinite(z) || z <= 0) return DISPLAY_LOGIC_W / 2;
  if (z <= 1) return DISPLAY_LOGIC_W / 2;
  const halfW = DISPLAY_LOGIC_W / 2 / z;
  return DISPLAY_LOGIC_W - halfW;
}

/** Sync with displayCalibrate.displayCameraCenterY (blend top/bottom when z>1). */
const DISPLAY_CAMERA_Y_ZOOM_ANCHOR_BLEND = 0.1;
function displayCameraCenterYFromZoom(z) {
  if (!Number.isFinite(z) || z <= 0) return DISPLAY_LOGIC_H / 2;
  if (z <= 1) return DISPLAY_LOGIC_H / 2;
  const halfH = DISPLAY_LOGIC_H / 2 / z;
  const cyTop = halfH;
  const cyBottom = DISPLAY_LOGIC_H - halfH;
  return cyTop + DISPLAY_CAMERA_Y_ZOOM_ANCHOR_BLEND * (cyBottom - cyTop);
}

/** Phaser emoji Text is not square at `fontSize`; fixed box matches server AABB so static/moving cells align. */
function addGridCellEmojiText(scene, centerX, centerY, cellW, cellH, glyph, depth) {
  const fs = Math.min(cellW, cellH);
  return scene.add.text(centerX, centerY, glyph, {
    fontSize: `${fs}px`,
    align: 'center',
    fixedWidth: cellW,
    fixedHeight: cellH,
  }).setOrigin(0.5).setDepth(depth);
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    gameScene = this;
    this._displayConfig = sanitizeDisplayConfig(displayConfig);
    this.scale.on('resize', () => this.applyDisplayProjection());
    this.playerGfx = {};
    this.trailEmitters = {};
    this.botAuras = {};   // pulsing aura Graphics per bot
    this.bulletGfx = [];  // array of Phaser graphics for bullets

    // ── Layout constants ──────────────────────────────────────────────
    const GAME_W = 1600;  // game area width (matches server ARENA_W)
    const SIDEBAR_W = 320; // right sidebar
    const SIDEBAR_X = GAME_W; // sidebar starts here

    // ── Sidebar background — +2px width to guarantee no gap at canvas right edge
    this.add.rectangle(SIDEBAR_X + SIDEBAR_W / 2 + 1, 540, SIDEBAR_W + 2, 1080, 0x3b2d4a)
      .setDepth(140);
    // Divider line
    this.add.rectangle(SIDEBAR_X, 540, 3, 1080, 0x6644aa).setDepth(141);

    // ── Terrain background (game area only) ─────────────────────────
    const terrainTiles = ['░', '▒', '·', '∙', '╌', '░'];
    const terrainColors = ['#e0d8a8', '#d8d0a0', '#e5ddb0', '#ddd5a5', '#e2daa8', '#d5cd98'];
    const tileW = 80;   // 1600 / 80 = 20 columns (exact)
    const tileH = 72;   // 1080 / 72 = 15 rows (exact)
    for (let tx = 0; tx < GAME_W; tx += tileW) {
      for (let ty = 0; ty < 1080; ty += tileH) {
        const col = tx / tileW;
        const row = ty / tileH;
        const idx = (col + row) % terrainTiles.length;
        const jitter = ((tx * 7 + ty * 13) % 6);
        const tile = terrainTiles[(idx + jitter) % terrainTiles.length];
        const color = terrainColors[(idx + jitter) % terrainColors.length];
        this.add.text(tx + tileW / 2, ty + tileH / 2, tile, {
          fontSize: '44px', fontFamily: 'monospace', color: color
        }).setOrigin(0.5).setDepth(0).setAlpha(0.5);
      }
    }

    // Faint terrain emoji patches (game area only)
    const patches = [
      { e: '🌿', c: 12 }, { e: '🌾', c: 8 }, { e: '🪨', c: 6 }, { e: '🏜️', c: 5 }
    ];
    for (const patch of patches) {
      for (let i = 0; i < patch.c; i++) {
        const px = 60 + Math.floor(((i * 347 + patch.c * 113) % (GAME_W - 120)));
        const py = 60 + Math.floor(((i * 521 + patch.c * 79) % 960));
        this.add.text(px, py, patch.e, { fontSize: '28px' })
          .setOrigin(0.5).setDepth(1).setAlpha(0.12);
      }
    }

    // Obstacle text objects
    this.obsTexts = [];

    // Coin text objects — pre-allocate 5 slots (max coins visible at once)
    this.coinTexts = [];
    for (let i = 0; i < 5; i++) {
      this.coinTexts.push(
        this.add.text(0, 0, '🍎', { fontSize: '30px' }).setOrigin(0.5).setDepth(5).setVisible(false)
      );
    }

    // ── Sidebar: Leaderboard ────────────────────────────────────────
    const lbCenterX = SIDEBAR_X + SIDEBAR_W / 2;
    this.lbTitle = this.add.text(lbCenterX, 24, '🏆 LEADERBOARD', {
      fontSize: '22px', fontFamily: 'monospace', color: '#ffdd44', align: 'center'
    }).setOrigin(0.5, 0).setDepth(151);
    this.lbRows = [];
    this.lbBgs = [];
    const rowH = 34;
    const rowW = SIDEBAR_W - 20;
    for (let i = 0; i < 10; i++) {
      const ry = 60 + i * rowH;
      // Button-style background with rounded look
      const bg = this.add.rectangle(SIDEBAR_X + 10 + rowW / 2, ry + rowH / 2 - 2, rowW, rowH - 4, 0x4a3660)
        .setDepth(150).setAlpha(0);
      // Highlight edge (top lighter)
      const highlight = this.add.rectangle(SIDEBAR_X + 10 + rowW / 2, ry + 2, rowW, 2, 0x7755aa)
        .setDepth(150).setAlpha(0);
      this.lbBgs.push({ bg, highlight });
      const t = this.add.text(SIDEBAR_X + 12, ry + 2, '', {
        fontSize: '16px', fontFamily: 'monospace', color: '#eee'
      }).setDepth(151);
      this.lbRows.push(t);
    }

    // ── Sidebar: QR + footers — anchored to bottom of 1080 logical canvas ──
    const sbPadBottom = 12;
    const sbQrLift = 32; // move QR + SCAN upward (camera Y blend can push footers low)
    const sbQrSize = 168;
    const sbQrHalf = sbQrSize / 2;
    const sbGapQrFoot = 12;
    const sbGapScanQr = 12;
    const sbFoot2Y = DISPLAY_LOGIC_H - sbPadBottom - 8; // copyright (last line)
    const sbFoot1Y = sbFoot2Y - 34; // title line above
    const sbQrCenterY = sbFoot1Y - sbGapQrFoot - sbQrHalf - 8 - sbQrLift;
    const sbScanY = sbQrCenterY - sbQrHalf - sbGapScanQr - 8;

    const origin = window.location.origin;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(origin + '/controller.html')}`;
    this.qrLoaded = false;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      this.textures.addImage('qr', img);
      this.qrSprite = this.add.image(lbCenterX, sbQrCenterY, 'qr')
        .setDisplaySize(sbQrSize, sbQrSize).setDepth(152).setAlpha(0.95);
      this.qrLoaded = true;
    };
    img.src = qrUrl;

    this.add.text(lbCenterX, sbScanY, '📱 SCAN TO PLAY', {
      fontSize: '20px', fontFamily: 'monospace', color: '#ffdd44', align: 'center'
    }).setOrigin(0.5).setDepth(152);

    // Waiting text (centered in game area)
    this.waitingText = this.add.text(GAME_W / 2, 480, 'WAITING FOR HOST...', {
      fontSize: '72px', fontFamily: 'monospace', color: '#333',
      stroke: '#999', strokeThickness: 4
    }).setOrigin(0.5).setDepth(200).setAlpha(0);

    // Particle texture (small white square)
    const pg = this.make.graphics({ add: false });
    pg.fillStyle(0xffffff);
    pg.fillRect(0, 0, 6, 6);
    pg.generateTexture('particle', 6, 6);
    pg.destroy();

    this.add.text(lbCenterX, sbFoot1Y, '⚡ Neon Bumper Cars', {
      fontSize: '20px', fontFamily: 'monospace', color: '#ffffff', align: 'center'
    }).setOrigin(0.5).setDepth(152);
    this.add.text(lbCenterX, sbFoot2Y, '© 2026 carlok  |  v1.1.24', {
      fontSize: '16px', fontFamily: 'monospace', color: '#aaaaaa', align: 'center'
    }).setOrigin(0.5).setDepth(152);

    this.obstaclesCreated = false;
    this.applyDisplayProjection();
    this.time.delayedCall(0, () => this.applyDisplayProjection());
  }

  update() {
    // Create obstacles once
    if (!this.obstaclesCreated && obstacles.length > 0) {
      this.obstaclesCreated = true;
      const treeEmojis = ['🌲', '🌳', '🌴', '🌵', '🪴'];
      const stoneEmojis = ['🪨', '🧱', '🪵', '🗿', '⛰️'];
      const emojiMap = { lake: '🌊' };
      let stoneIdx = 0;
      let treeIdx = 0;
      for (const ob of obstacles) {
        let emoji;
        if (ob.type === 'tree') {
          emoji = treeEmojis[treeIdx % treeEmojis.length];
          treeIdx++;
        } else if (ob.type === 'stone') {
          emoji = stoneEmojis[stoneIdx % stoneEmojis.length];
          stoneIdx++;
        } else {
          emoji = emojiMap[ob.type] || '❓';
        }
        const t = addGridCellEmojiText(
          this,
          ob.x + ob.w / 2,
          ob.y + ob.h / 2,
          ob.w,
          ob.h,
          emoji,
          3
        );
        this.obsTexts.push(t);
      }
    }

    // Waiting overlay
    if (gameState === 'WAITING') {
      this.waitingText.setAlpha(0.7 + 0.3 * Math.sin(this.time.now / 400));
    } else {
      this.waitingText.setAlpha(0);
    }

    // Process event queue
    while (eventQueue.length) {
      const ev = eventQueue.shift();
      if (ev.type === 'coin-eaten') this.doCoinBurst(ev.cx, ev.cy);
      if (ev.type === 'bump') this.doBump(ev);
      if (ev.type === 'eliminated') this.doEliminated(ev.id);
      if (ev.type === 'shot-hit') this.doShotHit(ev);
      if (ev.type === 'shot-fired') this.doShotFlash(ev);
      if (ev.type === 'obstacles-reset') {
        for (const t of this.obsTexts) t.destroy();
        this.obsTexts = [];
        this.obstaclesCreated = false;
      }
    }

    // Update / create player graphics
    for (const id in serverPlayers) {
      const sp = serverPlayers[id];
      if (!sp.alive) {
        if (this.playerGfx[id]) {
          this.playerGfx[id].destroy();
          delete this.playerGfx[id];
        }
        if (this.trailEmitters[id]) {
          this.trailEmitters[id].stop();
          delete this.trailEmitters[id];
        }
        if (this.botAuras[id]) {
          this.botAuras[id].destroy();
          delete this.botAuras[id];
        }
        continue;
      }
      if (!this.playerGfx[id]) {
        const faceEmoji = sp.emoji || '😀';
        const g = addGridCellEmojiText(
          this,
          sp.x + 20,
          sp.y + 20,
          40,
          40,
          faceEmoji,
          10
        );
        this.playerGfx[id] = g;

        // Particle trail (red menacing trail for bots)
        const trailTint = sp.isBot ? 0xff0000 : Phaser.Display.Color.HexStringToColor(sp.color).color;
        const emitter = this.add.particles(0, 0, 'particle', {
          speed: { min: 10, max: sp.isBot ? 50 : 30 },
          scale: { start: sp.isBot ? 1.2 : 0.8, end: 0 },
          alpha: { start: sp.isBot ? 0.8 : 0.6, end: 0 },
          lifespan: sp.isBot ? 600 : 400,
          frequency: sp.isBot ? 30 : 50,
          blendMode: Phaser.BlendModes.ADD,
          tint: trailTint,
        });
        emitter.setDepth(9);
        this.trailEmitters[id] = emitter;
      }

      const g = this.playerGfx[id];
      g.setPosition(sp.x + 20, sp.y + 20);

      // Blink when invulnerable
      if (sp.invuln) {
        g.setAlpha(Math.sin(this.time.now / 50) > 0 ? 1 : 0.2);
      } else {
        g.setAlpha(1);
      }

      // Trail follow
      if (this.trailEmitters[id]) {
        this.trailEmitters[id].setPosition(sp.x + 20, sp.y + 20);
      }

      // Bot aura — pulsing double-rect so bots are unmistakable
      if (sp.isBot) {
        if (!this.botAuras[id]) {
          this.botAuras[id] = this.add.graphics().setDepth(11);
        }
        const aura = this.botAuras[id];
        const pulse = 0.5 + 0.5 * Math.sin(this.time.now / 140);
        aura.clear();
        // Inner tight square
        aura.lineStyle(2 + pulse * 2, 0xff2200, 0.7 + pulse * 0.3);
        aura.strokeRect(sp.x - 4, sp.y - 4, 48, 48);
        // Outer glow ring
        aura.lineStyle(1, 0xff6600, 0.25 + pulse * 0.25);
        aura.strokeRect(sp.x - 9, sp.y - 9, 58, 58);
      }
    }

    // Remove disconnected
    for (const id in this.playerGfx) {
      if (!serverPlayers[id]) {
        this.playerGfx[id].destroy();
        delete this.playerGfx[id];
        if (this.trailEmitters[id]) {
          this.trailEmitters[id].stop();
          delete this.trailEmitters[id];
        }
        if (this.botAuras[id]) {
          this.botAuras[id].destroy();
          delete this.botAuras[id];
        }
      }
    }

    // Coins — permanent gentle pulse, staggered phase per slot
    for (let i = 0; i < this.coinTexts.length; i++) {
      if (i < serverCoins.length) {
        const c = serverCoins[i];
        if (c.emoji) this.coinTexts[i].setText(c.emoji);
        this.coinTexts[i].setPosition(c.x + 15, c.y + 15).setVisible(true);
        this.coinTexts[i].setScale(1.0 + 0.28 * Math.sin(this.time.now / 220 + i * 1.3));
      } else {
        this.coinTexts[i].setVisible(false);
      }
    }

    // ── Bullets ──────────────────────────────────────────────────────
    // Remove old bullet graphics
    for (const bg of this.bulletGfx) bg.destroy();
    this.bulletGfx = [];
    // Draw current bullets (bright, visible projectiles)
    for (const b of serverBullets) {
      const color = Phaser.Display.Color.HexStringToColor(b.ownerColor || '#ff0').color;
      // Core bullet
      const core = this.add.circle(b.x + 5, b.y + 5, 7, 0xffffff).setDepth(21).setAlpha(1);
      // Colored ring
      const ring = this.add.circle(b.x + 5, b.y + 5, 10, color).setDepth(20).setAlpha(0.8);
      // Outer glow
      const glow = this.add.circle(b.x + 5, b.y + 5, 16, color).setDepth(19).setAlpha(0.25);
      this.bulletGfx.push(core, ring, glow);
    }

    // Leaderboard with names (exclude bots)
    const sorted = Object.values(serverPlayers)
      .filter(p => p.alive && !p.isBot)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);
    for (let i = 0; i < 10; i++) {
      if (i < sorted.length) {
        const p = sorted[i];
        const hearts = '♥'.repeat(Math.max(0, p.lives));
        const name = (p.name || '???').slice(0, 10);
        const shots = p.shotsLeft !== undefined ? ` 💥${p.shotsLeft}` : '';
        this.lbRows[i].setText(`${i + 1}. ${p.emoji || '■'} ${name} ${p.score}p ${hearts}${shots}`);
        this.lbRows[i].setColor(p.color);
        this.lbBgs[i].bg.setAlpha(i === 0 ? 0.9 : 0.6);
        this.lbBgs[i].highlight.setAlpha(i === 0 ? 0.8 : 0.4);
      } else {
        this.lbRows[i].setText('');
        this.lbBgs[i].bg.setAlpha(0);
        this.lbBgs[i].highlight.setAlpha(0);
      }
    }
  }

  /**
   * Project the arena from a selected output resolution and a fixed env-driven arena-column count.
   * zoom is derived from visible columns, while the selected resolution only affects the fitted canvas size
   * and the resulting on-screen px size of each 40-world-unit reference cell.
   */
  setDisplayConfig(nextConfig) {
    this._displayConfig = sanitizeDisplayConfig(nextConfig);
    this.applyDisplayProjection();
  }

  applyDisplayProjection() {
    const cam = this.cameras.main;
    const projection = computeDisplayProjection(
      this._displayConfig?.arenaColumns,
      this._displayConfig?.targetWidth,
      this._displayConfig?.targetHeight
    );
    cam.setZoom(projection.zoom);
    cam.centerOn(
      displayCameraCenterXFromZoom(projection.zoom),
      displayCameraCenterYFromZoom(projection.zoom)
    );
  }

  doCoinBurst(cx, cy) {
    const burst = this.add.particles(cx, cy, 'particle', {
      speed: { min: 80, max: 200 },
      scale: { start: 1.2, end: 0 },
      lifespan: 500,
      quantity: 20,
      tint: 0xffff00,
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(50);
    burst.explode(20);
    this.time.delayedCall(600, () => burst.destroy());
  }

  doBump(ev) {
    this.cameras.main.shake(200, 0.01);
    // Explosion at midpoint
    const mx = (ev.ax + ev.bx) / 2;
    const my = (ev.ay + ev.by) / 2;
    const burst = this.add.particles(mx, my, 'particle', {
      speed: { min: 100, max: 300 },
      scale: { start: 1.5, end: 0 },
      lifespan: 400,
      quantity: 30,
      tint: [0xff3366, 0xff6600, 0xffff00],
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(50);
    burst.explode(30);
    this.time.delayedCall(500, () => burst.destroy());
  }

  doEliminated(id) {
    const g = this.playerGfx[id];
    if (g) {
      const burst = this.add.particles(g.x, g.y, 'particle', {
        speed: { min: 50, max: 250 },
        scale: { start: 2, end: 0 },
        lifespan: 800,
        quantity: 40,
        tint: 0xff0000,
        blendMode: Phaser.BlendModes.ADD,
        emitting: false,
      });
      burst.setDepth(50);
      burst.explode(40);
      this.time.delayedCall(900, () => burst.destroy());
    }
  }

  doShotFlash(ev) {
    // Muzzle flash at shot origin
    const flash = this.add.circle(ev.x + 5, ev.y + 5, 12,
      Phaser.Display.Color.HexStringToColor(ev.color || '#fff').color)
      .setDepth(55).setAlpha(0.8);
    this.tweens.add({
      targets: flash, alpha: 0, scale: 2, duration: 150,
      onComplete: () => flash.destroy()
    });
  }

  doShotHit(ev) {
    if (ev.type === 'obstacle') return; // no visual for hitting static objects

    // Glow burst when hitting player or bot
    const tint = ev.type === 'bot' ? 0x00ffff : 0xff3366;
    const burst = this.add.particles(ev.x, ev.y, 'particle', {
      speed: { min: 60, max: 180 },
      scale: { start: 1.5, end: 0 },
      lifespan: 400,
      quantity: 20,
      tint: tint,
      blendMode: Phaser.BlendModes.ADD,
      emitting: false,
    });
    burst.setDepth(55);
    burst.explode(20);
    this.time.delayedCall(500, () => burst.destroy());

    // Flash ring
    const ring = this.add.circle(ev.x, ev.y, 8, tint).setDepth(56).setAlpha(0.9);
    this.tweens.add({
      targets: ring, alpha: 0, scale: 5, duration: 300,
      onComplete: () => ring.destroy()
    });
  }
}

applyDisplayViewportSize();

// Render buffer: DPR × CSS scale of the fitted viewport (capped) for crisp emojis on 4K / Retina.
const _root = document.getElementById('phaser-root');
const _scaleToFit = Math.min(_root.clientWidth / 1920, _root.clientHeight / 1080, 1) || 1;
const RESOLUTION = Math.min(Math.ceil((window.devicePixelRatio || 1) * Math.max(1, _scaleToFit)), 3);

const config = {
  type: Phaser.WEBGL,
  parent: 'phaser-root',
  width: 1920,
  height: 1080,
  resolution: RESOLUTION,
  backgroundColor: '#f5f0d0',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: GameScene,
};

window.__neonPhaserGame = new Phaser.Game(config);

window.addEventListener('resize', () => {
  applyDisplayViewportSize();
});
</script>
