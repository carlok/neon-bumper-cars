<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Neon Bumper Cars</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#eee; font-family:'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
  .panel { background:#111; border:1px solid #333; border-radius:12px; padding:40px; width:360px; text-align:center; }
  h1 { font-size:22px; color:#0ff; margin-bottom:24px; text-transform:uppercase; letter-spacing:2px; }
  input { width:100%; padding:12px; font-size:16px; border:1px solid #444; border-radius:8px; background:#1a1a1a; color:#fff; margin-bottom:16px; text-align:center; }
  button { width:100%; padding:14px; font-size:16px; font-weight:700; border:none; border-radius:8px; cursor:pointer; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; transition:opacity .2s; }
  button:active { opacity:.7; }
  .start { background:#00ff66; color:#000; }
  .stop  { background:#ff3366; color:#fff; }
  #status { margin-top:16px; font-size:18px; color:#888; }
</style>
</head>
<body>
<div class="panel">
  <h1>⚙ Admin Panel</h1>
  <input id="pw" type="password" placeholder="Password">
  <button class="start" onclick="send('start')">▶ Start Game</button>
  <button class="stop" onclick="send('stop')">■ Stop Game</button>
  <div id="status">Connecting…</div>
</div>
<div style="position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:12px; color:#555;">
  ⚡ Neon Bumper Cars &nbsp;|&nbsp; <a href="https://github.com/carlok/neon-bumper-cars" style="color:#555; text-decoration:none;">🐙</a> &nbsp;|&nbsp; © 2026 carlok &nbsp;|&nbsp; v1.1.14
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  socket.emit('join-admin');
  socket.on('connect', () => document.getElementById('status').textContent = 'Connected');
  socket.on('gameStateChange', s => document.getElementById('status').textContent = 'State: ' + s);
  function send(action) {
    const pw = document.getElementById('pw').value;
    socket.emit(action === 'start' ? 'admin-start' : 'admin-stop', pw);
  }
</script>
</body>
</html>
