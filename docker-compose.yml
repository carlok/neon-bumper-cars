services:
  # ── Production ────────────────────────────────────────────────────
  neon-bumper-cars:
    build: .
    container_name: neon-bumper-cars
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Loads ADMIN_PASSWORD (and overrides) without Compose-time ${VAR} warnings.
    # Copy `.env.example` → `.env` before `podman compose up` (Compose v2.24+).
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/admin.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Development (live-reload, no rebuild needed) ──────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: neon-bumper-cars-dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./server.js:/app/server.js
      - ./public:/app/public
      - ./src:/app/src
    profiles:
      - dev

  # ── Tests + coverage (no host deps, Podman safe) ──────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: neon-bumper-cars-test
    command: ["npm", "run", "test:coverage"]
    volumes:
      - ./src:/app/src
      - ./test:/app/test
    profiles:
      - test
