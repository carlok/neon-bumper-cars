services:
  neon-bumper-cars:
    build: .
    container_name: neon-bumper-cars
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/admin.html"]
      interval: 30s
      timeout: 5s
      retries: 3
